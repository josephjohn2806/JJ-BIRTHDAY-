<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJ's Premium 3D Birthday Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --cake-pink: #c19193; 
            --accent-glow: rgba(193, 145, 147, 0.3);
            --bg-dark: #120b0c;
            --card-bg: rgba(34, 22, 24, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-light: #f5eae9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* Top Navigation Bar inspired by Video */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(18, 11, 12, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 700;
            font-size: 1.6rem;
            color: var(--cake-pink);
            letter-spacing: 2px;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--cake-pink);
        }

        /* Floating Widget Inspired by the Video Sidebar Profile */
        .floating-profile-widget {
            position: fixed;
            right: 30px;
            bottom: 40px;
            background: var(--cake-pink);
            color: var(--bg-dark);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 25px rgba(193, 145, 147, 0.5);
            z-index: 999;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .floating-profile-widget:hover {
            transform: scale(1.1) rotate(15deg);
        }

        /* Main Sections Layout */
        section {
            padding: 100px 5% 60px 5%;
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .section-title {
            font-size: 2.5rem;
            color: var(--cake-pink);
            margin-bottom: 10px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .section-subtitle {
            font-size: 1rem;
            opacity: 0.7;
            margin-bottom: 40px;
            text-align: center;
        }

        /* 3D Image Slider/Carousel Container */
        .stage-3d {
            perspective: 1100px;
            width: 100%;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .carousel-3d {
            width: 240px;
            height: 320px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCarousel 25s infinite linear;
        }

        .carousel-3d:hover {
            animation-play-state: paused;
        }

        .carousel-item-3d {
            position: absolute;
            width: 240px;
            height: 320px;
            left: 0;
            top: 0;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: border-color 0.3s;
        }
        .carousel-item-3d:hover {
            border-color: var(--cake-pink);
        }

        .carousel-item-3d img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 3D Image Positioning (10 Images total = 36 degrees apart) */
        .carousel-item-3d:nth-child(1)  { transform: rotateY(0deg) translateZ(400px); }
        .carousel-item-3d:nth-child(2)  { transform: rotateY(36deg) translateZ(400px); }
        .carousel-item-3d:nth-child(3)  { transform: rotateY(72deg) translateZ(400px); }
        .carousel-item-3d:nth-child(4)  { transform: rotateY(108deg) translateZ(400px); }
        .carousel-item-3d:nth-child(5)  { transform: rotateY(144deg) translateZ(400px); }
        .carousel-item-3d:nth-child(6)  { transform: rotateY(180deg) translateZ(400px); }
        .carousel-item-3d:nth-child(7)  { transform: rotateY(216deg) translateZ(400px); }
        .carousel-item-3d:nth-child(8)  { transform: rotateY(252deg) translateZ(400px); }
        .carousel-item-3d:nth-child(9)  { transform: rotateY(288deg) translateZ(400px); }
        .carousel-item-3d:nth-child(10) { transform: rotateY(324deg) translateZ(400px); }

        /* 3D Immersive Interactive Cake Display */
        .cake-stage {
            perspective: 800px;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }

        .cake-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(45deg);
            animation: spinCake 12s infinite linear;
        }

        .cake-cylinder {
            position: absolute;
            width: 160px;
            height: 100px;
            left: 70px;
            top: 100px;
            transform-style: preserve-3d;
        }

        .cake-face {
            position: absolute;
            width: 160px;
            height: 100px;
            background: linear-gradient(to bottom, #5a4547, #423334);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 3D Side panels mapping */
        .cake-face:nth-child(1) { transform: rotateY(0deg) translateZ(80px); }
        .cake-face:nth-child(2) { transform: rotateY(90deg) translateZ(80px); }
        .cake-face:nth-child(3) { transform: rotateY(180deg) translateZ(80px); }
