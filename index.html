<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musembi Earthways Safaris</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Global Setup matching the original UI structure */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #fcfbfa;
            color: #1f2937;
            overflow-x: hidden;
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 20px;
            background: rgba(252, 251, 250, 0.9);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.5px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-start-hiring {
            background: white;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn-start-hiring:hover {
            background: #f9fafb;
        }

        /* Custom Hamburger Button matching video style */
        .hamburger-btn {
            background: #f3f4f6;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .hamburger-btn span {
            display: block;
            width: 18px;
            height: 2px;
            background: #1f2937;
            border-radius: 2px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* Fullscreen Navigation Sheet overlaying from top */
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #4f46e5; /* Using original bright violet/blue palette background */
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 24px 60px 24px;
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .menu-overlay.active {
            transform: translateY(0);
        }

        .menu-header {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-top: 40px;
        }

        .menu-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 28px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .menu-links a:hover {
            color: #ffffff;
        }

        /* Bottom Row with Social Media Icons */
        .menu-footer-socials {
            display: flex;
            justify-content: center;
            gap: 28px;
            width: 100%;
            padding-top: 40px;
        }

        .menu-footer-socials a {
            color: white;
            font-size: 22px;
            opacity: 0.9;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .menu-footer-socials a:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* Hero Graphic Stack Layer matching video layout */
        .hero-graphic-stack {
            position: relative;
            max-width: 340px;
            height: 280px;
            margin: 30px auto 40px auto;
        }

        .avatar-card {
            position: absolute;
            width: 130px;
            height: 160px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 3px solid white;
        }

        /* Precise layering positions based on video frame */
        .card-left {
            background-image: url('https://images.unsplash.com/photo-1516426122078-c23e76319801?auto=format&fit=crop&q=80&w=400');
            left: 0;
            bottom: 10px;
            z-index: 1;
            transform: rotate(-6deg);
        }

        .card-center {
            background-image: url('https://images.unsplash.com/photo-1547471080-7cc2caa01a7e?auto=format&fit=crop&q=80&w=400');
            left: 55%;
            transform: translateX(-50%);
            top: 0;
            width: 140px;
            height: 175px;
            z-index: 3;
        }

        .card-right {
            background-image: url('https://images.unsplash.com/photo-1523805009345-7448845a9e53?auto=format&fit=crop&q=80&w=400');
            right: 0;
            bottom: 20px;
            z-index: 2;
            transform: rotate(8deg);
        }

        /* Floating Badges (Unicorn, Rainbow, Fire, Laugh Emoji) */
        .floating-badge {
            position: absolute;
            font-size: 24px;
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            animation: floatingBounce 3s ease-in-out infinite;
        }

        .badge-unicorn { top: 10px; left: -10px; animation-delay: 0s; }
        .badge-rainbow { top: -15px; right: 40px; animation-delay: 0.5s; }
        .badge-laugh   { bottom: 20px; left: 60px; animation-delay: 1s; }
        .badge-fire    { bottom: 40px; right: 0px; animation-delay: 1.5s; }

        @keyframes floatingBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* Content Text Styles */
        .main-content {
            text-align: center;
            padding: 0 24px;
            max-width: 480px;
            margin: 0 auto;
        }

        .main-title {
            font-size: 44px;
            font-weight: 800;
            color: #111827;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        .main-description {
            font-size: 16px;
            line-height: 1.6;
            color: #6b7280;
            margin-bottom: 36px;
        }

        /* The Custom Rounded Action Button */
        .action-container {
            margin-bottom: 60px;
        }

        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #4f46e5;
            color: white;
            padding: 16px 36px;
            border-radius: 32px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.35);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-action:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 28px rgba(79, 70, 229, 0.45);
        }

        .btn-icon-circle {
            background: rgba(255, 255, 255, 0.2);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">u earthways</div>
        <div class="nav-right">
            <button class="btn-start-hiring">Plan Journey</button>
            <button class="hamburger-btn" id="menuOpenBtn">
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <div class="menu-overlay" id="navSheet">
        <div class="menu-header">
            <button class="close-btn" id="menuCloseBtn">✕</button>
        </div>
        <div class="menu-links">
            <a href="#">Destinations</a>
            <a href="#">Safari Packages</a>
            <a href="#">Pricing</a>
            <a href="#">About Us</a>
        </div>
        <div class="menu-footer-socials">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
    </div>

    <div class="hero-graphic-stack">
        <div class="floating-badge badge-unicorn">🦄</div>
        <div class="floating-badge badge-rainbow">🌈</div>
        <div class="floating-badge badge-laugh">😂</div>
        <div class="floating-badge badge-fire">🔥</div>

        <div class="avatar-card card-left"></div>
        <div class="avatar-card card-center"></div>
        <div class="avatar-card card-right"></div>
    </div>

    <main class="main-content">
        <h1 class="main-title">Join the Safari Movement</h1>
        <p class="main-description">
            We're building the future of global travel — one journey at a time. If you're driven, proactive, and passionate about discovering the authentic plains of Kenya, Musembi Earthways is where you'll thrive.
        </p>
        
        <form action="http://127.0.0.1:5000/explore" method="POST" class="action-container">
            <button type="submit" class="btn-action">
                <div class="btn-icon-circle">➔</div>
                <span>Explore Safaris</span>
            </button>
        </form>
    </main>

    <script>
        const navSheet = document.getElementById('navSheet');
        const menuOpenBtn = document.getElementById('menuOpenBtn');
        const menuCloseBtn = document.getElementById('menuCloseBtn');

        // Handles sheet drop down transition
        menuOpenBtn.addEventListener('click', () => {
            navSheet.classList.add('active');
        });

        // Handles sheet retraction animation
        menuCloseBtn.addEventListener('click', () => {
            navSheet.classList.remove('active');
        });

        // 3D Tilt interaction across stacked asset components
        const cardStackContainer = document.querySelector('.hero-graphic-stack');
        const layeredCards = document.querySelectorAll('.avatar-card');

        cardStackContainer.addEventListener('mousemove', (e) => {
            const bounds = cardStackContainer.getBoundingClientRect();
            const pointerX = e.clientX - bounds.left;
            const pointerY = e.clientY - bounds.top;
            
            const positionX = (pointerX / bounds.width) - 0.5;
            const positionY = (pointerY / bounds.height) - 0.5;

            layeredCards.forEach((card, index) => {
                const multiFactor = (index + 1) * 12;
                card.style.transform = `translate(${positionX * multiFactor}px, ${positionY * multiFactor}px)`;
            });
        });

        cardStackContainer.addEventListener('mouseleave', () => {
            layeredCards.forEach((card) => {
                card.style.transform = '';
            });
        });
    </script>
</body>
</html>
